<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <script src="app.js" defer></script>
</head>
<body>

<header>
    <h1>Personal Library</h1>
</header>

<div class="main-content">
    <button id="btn-add-book">+ Add Book</button>

    <div class="books">
        
    </div>

    <dialog class="modal" id="modal-add-book">
        <form onsubmit="createBook()" method="dialog" id="form-add-book">
            <h3>Add New Book</h3>
            <input type="text" name="title" id="title" placeholder="Title" required>
            <input type="text" name="author" id="author" placeholder="Author" required>
            <input type="number" name="pages" id="pages" placeholder="Pages" required min="1">
            <label for="read">
                Have you read it?
                <input type="checkbox" name="read" id="read">
            </label>
            <button type="submit" id="submit-book">Submit</button>
        </form>
    </dialog>
</div>
    
</body>
</html>
